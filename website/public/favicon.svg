<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lotus logo">
  <defs>
    <path id="petal-lg" d="M256 256 C 204 194 198 104 256 40 C 314 104 308 194 256 256 Z"/>
    <path id="petal-sm" d="M256 256 C 224 214 220 150 256 104 C 292 150 288 214 256 256 Z"/>
  </defs>

  <!-- Outer ring : 8 petals, primary cyan-600 -->
  <g fill="#0891b2">
    <use href="#petal-lg" transform="rotate(0 256 256)"/>
    <use href="#petal-lg" transform="rotate(45 256 256)"/>
    <use href="#petal-lg" transform="rotate(90 256 256)"/>
    <use href="#petal-lg" transform="rotate(135 256 256)"/>
    <use href="#petal-lg" transform="rotate(180 256 256)"/>
    <use href="#petal-lg" transform="rotate(225 256 256)"/>
    <use href="#petal-lg" transform="rotate(270 256 256)"/>
    <use href="#petal-lg" transform="rotate(315 256 256)"/>
  </g>

  <!-- Inner ring : 8 petals offset 22.5°, lighter cyan-500 -->
  <g fill="#06b6d4">
    <use href="#petal-sm" transform="rotate(22.5 256 256)"/>
    <use href="#petal-sm" transform="rotate(67.5 256 256)"/>
    <use href="#petal-sm" transform="rotate(112.5 256 256)"/>
    <use href="#petal-sm" transform="rotate(157.5 256 256)"/>
    <use href="#petal-sm" transform="rotate(202.5 256 256)"/>
    <use href="#petal-sm" transform="rotate(247.5 256 256)"/>
    <use href="#petal-sm" transform="rotate(292.5 256 256)"/>
    <use href="#petal-sm" transform="rotate(337.5 256 256)"/>
  </g>

  <!-- Center -->
  <circle cx="256" cy="256" r="30" fill="#22d3ee"/>
</svg>
